# Make it use C-<space>
unbind C-b
unbind l
set -g prefix C-Space
bind-key C-Space last-window

# Reload key
bind r source-file ~/.tmux.conf

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"
set-window-option -g mouse on
set-window-option -g allow-rename off

# Shift+arrow pane navigation (no wrapping)
bind -T root S-Up    if-shell -F "#{pane_at_top}"    '' 'select-pane -U'
bind -T root S-Down  if-shell -F "#{pane_at_bottom}" '' 'select-pane -D'
bind -T root S-Left  if-shell -F "#{pane_at_left}"   '' 'select-pane -L'
bind -T root S-Right if-shell -F "#{pane_at_right}"  '' 'select-pane -R'

# Emacs-style pane management (C-x 2/3/0)
bind -T root C-x switch-client -T emacs
bind -T emacs 2 split-window -v
bind -T emacs 3 split-window -h
bind -T emacs 0 kill-pane

# Pane border styling
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour75,bold

# Active/inactive pane styling (bg=default preserves terminal transparency)
set -g window-active-style 'fg=terminal,bg=default'
set -g window-style 'fg=colour250,bg=default'

# Copy to system clipboard
bind -T copy-mode M-w send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
